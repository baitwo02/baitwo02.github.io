name: Deploy Hexo site to Pages

on:
  # 推送到 main 分支后自动触发
  push:
    branches:
      - main

  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# GitHub Pages 部署需要的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只进行一个 Pages 部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 下载仓库代码和 Git 子模块
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      # 安装 Node.js 24
      # 与本地的 v24.15.0 保持同一个主版本
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      # 安装 pnpm
      # 版本从 package.json 的 packageManager 字段读取：
      # "packageManager": "pnpm@11.10.0"
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true
          cache_dependency_path: pnpm-lock.yaml

      # 输出实际版本，方便排查环境问题
      - name: Show runtime versions
        run: |
          node --version
          pnpm --version

      # 配置 GitHub Pages
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v6

      # 严格按照 pnpm-lock.yaml 安装依赖
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 执行 package.json 中的 build 脚本
      - name: Build Hexo site
        run: pnpm run build

      # 上传 Hexo 生成的 public 目录
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    # build 成功后再部署
    needs: build

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 发布到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
